service: system-pulse
frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  timeout: 28
  memorySize: 256
  logRetentionInDays: 3
  deploymentBucket:
    blockPublicAccess: true
  environment:
    TABLE_NAME: ${self:service}-${sls:stage}-table
    SYSTEM_PULSE_TABLE: ${self:provider.environment.TABLE_NAME}
    USERS_TABLE: ${self:provider.environment.TABLE_NAME}
    HEALTH_CHECK_QUEUE_URL: !Ref HealthCheckQueue
    HEALTH_STATUS_TOPIC_ARN: !Ref HealthStatusTopic
    HEALTH_LOGS_BUCKET: !Ref HealthLogsBucket
    RENDER_WAKEUP_DELAY_SECONDS: ${env:RENDER_WAKEUP_DELAY_SECONDS, file(./scripts/serverless-env.cjs):RENDER_WAKEUP_DELAY_SECONDS, '90'}
    FRONTEND_URL: ${env:FRONTEND_URL, file(./scripts/serverless-env.cjs):FRONTEND_URL, ''}
    EMAIL_USER: ${env:EMAIL_USER, file(./scripts/serverless-env.cjs):EMAIL_USER, ''}
    EMAIL_PASS: ${env:EMAIL_PASS, file(./scripts/serverless-env.cjs):EMAIL_PASS, ''}
    INVITE_ELIGIBILITY_HOURS: ${env:INVITE_ELIGIBILITY_HOURS, file(./scripts/serverless-env.cjs):INVITE_ELIGIBILITY_HOURS, '24'}
    PASSWORD_RESET_ELIGIBILITY_MINUTES: ${env:PASSWORD_RESET_ELIGIBILITY_MINUTES, file(./scripts/serverless-env.cjs):PASSWORD_RESET_ELIGIBILITY_MINUTES, '30'}
    SHOW_INVITE_LINK: ${env:SHOW_INVITE_LINK, file(./scripts/serverless-env.cjs):SHOW_INVITE_LINK, 'false'}
    ENABLE_HEALTH_LOGS: ${env:ENABLE_HEALTH_LOGS, file(./scripts/serverless-env.cjs):ENABLE_HEALTH_LOGS, 'true'}
    ENABLE_SNS_NOTIFICATIONS: ${env:ENABLE_SNS_NOTIFICATIONS, file(./scripts/serverless-env.cjs):ENABLE_SNS_NOTIFICATIONS, 'false'}
    ENABLE_S3_ARCHIVE: ${env:ENABLE_S3_ARCHIVE, file(./scripts/serverless-env.cjs):ENABLE_S3_ARCHIVE, 'false'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - !GetAtt SystemPulseSingleTable.Arn
            - !Sub "${SystemPulseSingleTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ChangeMessageVisibility
          Resource:
            - !GetAtt HealthCheckQueue.Arn
            - !GetAtt HealthCheckDlq.Arn
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - !Ref HealthStatusTopic
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - !Sub "${HealthLogsBucket.Arn}/*"

functions:
  login:
    handler: src/handler.login
    events:
      - http:
          path: /auth/login
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  forgotPassword:
    handler: src/handler.forgotPassword
    events:
      - http:
          path: /auth/forgot-password
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  resetPassword:
    handler: src/handler.resetPassword
    events:
      - http:
          path: /auth/reset-password
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  createUserInvitation:
    handler: src/handler.createUserInvitation
    events:
      - http:
          path: /users/invite
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  acceptUserInvitation:
    handler: src/handler.acceptUserInvitation
    events:
      - http:
          path: /users/invite/accept
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  assignSystemAccess:
    handler: src/handler.assignSystemAccess
    events:
      - http:
          path: /users/{id}/systems
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  listUsers:
    handler: src/handler.listUsers
    events:
      - http:
          path: /users
          method: get
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  getUser:
    handler: src/handler.getUser
    events:
      - http:
          path: /users/{id}
          method: get
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  deleteUser:
    handler: src/handler.deleteUser
    events:
      - http:
          path: /users/{id}
          method: delete
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  listSystems:
    handler: src/handler.listSystems
    events:
      - http:
          path: /systems
          method: get
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  createHealthCheck:
    handler: src/handler.createHealthCheck
    events:
      - http:
          path: /systems
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  deleteSystem:
    handler: src/handler.deleteSystem
    events:
      - http:
          path: /systems/{id}
          method: delete
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  triggerHealthCheck:
    handler: src/handler.triggerHealthCheck
    events:
      - http:
          path: /systems/{id}/trigger
          method: post
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  getSystemLogs:
    handler: src/handler.getSystemLogs
    events:
      - http:
          path: /systems/{id}/logs
          method: get
          cors:
            origin: "*"
            headers:
              - Content-Type
              - Authorization
              - x-user-id
              - x-inviter-role
            allowCredentials: false

  processHealthCheckQueue:
    handler: src/handler.processHealthCheckQueue
    timeout: 60
    events:
      - sqs:
          arn: !GetAtt HealthCheckQueue.Arn
          batchSize: 5
          functionResponseType: ReportBatchItemFailures

resources:
  Resources:
    SystemPulseSingleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: entityType
            AttributeType: S
          - AttributeName: status_
            AttributeType: S
          - AttributeName: inviteToken
            AttributeType: S
          - AttributeName: resetToken
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: EntityTypeIndex
            KeySchema:
              - AttributeName: entityType
                KeyType: HASH
              - AttributeName: status_
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: InviteTokenIndex
            KeySchema:
              - AttributeName: inviteToken
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: ResetTokenIndex
            KeySchema:
              - AttributeName: resetToken
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    HealthCheckDlq:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${sls:stage}-health-check-dlq

    HealthCheckQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${sls:stage}-health-check-queue
        VisibilityTimeout: 180
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt HealthCheckDlq.Arn
          maxReceiveCount: 3

    HealthStatusTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-${sls:stage}-health-status

    HealthLogsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}-health-logs-${aws:accountId}-${aws:region}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        LifecycleConfiguration:
          Rules:
            - Id: ExpireOldHealthLogs
              Status: Enabled
              ExpirationInDays: 1

    ApiGatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,x-user-id,x-inviter-role'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

    ApiGatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,x-user-id,x-inviter-role'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  Outputs:
    SystemPulseTableName:
      Value: ${self:provider.environment.TABLE_NAME}
    HealthCheckQueueUrl:
      Value: !Ref HealthCheckQueue
    HealthStatusTopicArn:
      Value: !Ref HealthStatusTopic
    HealthLogsBucketName:
      Value: !Ref HealthLogsBucket

plugins:
  - serverless-plugin-typescript
