name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage suffix
        required: true
        default: dev
      region:
        description: AWS region
        required: true
        default: ap-southeast-1
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deployment.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      id-token: write
    env:
      SERVICE_NAME: system-pulse
      STAGE: ${{ github.event.inputs.stage || 'dev' }}
      AWS_REGION: ${{ github.event.inputs.region || 'ap-southeast-1' }}
      LAMBDA_KMS_KEY_ARN: ${{ vars.LAMBDA_KMS_KEY_ARN || '' }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      RENDER_WAKEUP_DELAY_SECONDS: ${{ vars.RENDER_WAKEUP_DELAY_SECONDS || '90' }}
      INVITE_ELIGIBILITY_HOURS: ${{ vars.INVITE_ELIGIBILITY_HOURS || '24' }}
      PASSWORD_RESET_ELIGIBILITY_MINUTES: ${{ vars.PASSWORD_RESET_ELIGIBILITY_MINUTES || '30' }}
      SHOW_INVITE_LINK: ${{ vars.SHOW_INVITE_LINK || 'false' }}
      ENABLE_HEALTH_LOGS: ${{ vars.ENABLE_HEALTH_LOGS || 'true' }}
      ENABLE_SNS_NOTIFICATIONS: ${{ vars.ENABLE_SNS_NOTIFICATIONS || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Validate AWS auth inputs
        id: aws-auth
        shell: bash
        run: |
          set -euo pipefail

          has_keys="false"
          has_role="false"

          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            has_keys="true"
          fi

          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            has_role="true"
          fi

          if [ "${has_keys}" != "true" ] && [ "${has_role}" != "true" ]; then
            echo "Missing AWS authentication for GitHub Actions."
            echo "Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets, or set AWS_ROLE_TO_ASSUME for OIDC."
            exit 1
          fi

          echo "has_keys=${has_keys}" >> "$GITHUB_OUTPUT"
          echo "has_role=${has_role}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (access key)
        if: ${{ steps.aws-auth.outputs.has_keys == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (OIDC role)
        if: ${{ steps.aws-auth.outputs.has_keys != 'true' && steps.aws-auth.outputs.has_role == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install and build backend
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Package backend zip
        run: |
          rm -f backend.zip
          cd backend
          zip -r ../backend.zip dist node_modules package.json

      - name: Provision DynamoDB, SQS, SNS and IAM
        shell: bash
        run: |
          set -euo pipefail

          TABLE_NAME="${SERVICE_NAME}-${STAGE}-table"
          QUEUE_NAME="${SERVICE_NAME}-${STAGE}-health-check-queue"
          DLQ_NAME="${SERVICE_NAME}-${STAGE}-health-check-dlq"
          TOPIC_NAME="${SERVICE_NAME}-${STAGE}-health-status"
          ROLE_NAME="${SERVICE_NAME}-${STAGE}-lambda-role"

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:${AWS_REGION}:${ACCOUNT_ID}:table/${TABLE_NAME}"

          if ! aws dynamodb describe-table --table-name "${TABLE_NAME}" >/dev/null 2>&1; then
            cat > /tmp/attribute-definitions.json <<'JSON'
          [
            {"AttributeName":"PK","AttributeType":"S"},
            {"AttributeName":"SK","AttributeType":"S"},
            {"AttributeName":"entityType","AttributeType":"S"},
            {"AttributeName":"status_","AttributeType":"S"},
            {"AttributeName":"inviteToken","AttributeType":"S"},
            {"AttributeName":"resetToken","AttributeType":"S"}
          ]
          JSON

            cat > /tmp/key-schema.json <<'JSON'
          [
            {"AttributeName":"PK","KeyType":"HASH"},
            {"AttributeName":"SK","KeyType":"RANGE"}
          ]
          JSON

            cat > /tmp/gsi.json <<'JSON'
          [
            {
              "IndexName":"EntityTypeIndex",
              "KeySchema":[
                {"AttributeName":"entityType","KeyType":"HASH"},
                {"AttributeName":"status_","KeyType":"RANGE"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            },
            {
              "IndexName":"InviteTokenIndex",
              "KeySchema":[
                {"AttributeName":"inviteToken","KeyType":"HASH"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            },
            {
              "IndexName":"ResetTokenIndex",
              "KeySchema":[
                {"AttributeName":"resetToken","KeyType":"HASH"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            }
          ]
          JSON

            aws dynamodb create-table \
              --table-name "${TABLE_NAME}" \
              --billing-mode PAY_PER_REQUEST \
              --attribute-definitions file:///tmp/attribute-definitions.json \
              --key-schema file:///tmp/key-schema.json \
              --global-secondary-indexes file:///tmp/gsi.json >/dev/null
          fi

          aws dynamodb wait table-exists --table-name "${TABLE_NAME}"

          if ! aws sqs get-queue-url --queue-name "${DLQ_NAME}" >/dev/null 2>&1; then
            aws sqs create-queue --queue-name "${DLQ_NAME}" >/dev/null
          fi

          DLQ_URL=$(aws sqs get-queue-url --queue-name "${DLQ_NAME}" --query QueueUrl --output text)
          DLQ_ARN=$(aws sqs get-queue-attributes --queue-url "${DLQ_URL}" --attribute-names QueueArn --query 'Attributes.QueueArn' --output text)

          if ! aws sqs get-queue-url --queue-name "${QUEUE_NAME}" >/dev/null 2>&1; then
            aws sqs create-queue --queue-name "${QUEUE_NAME}" >/dev/null
          fi

          QUEUE_URL=$(aws sqs get-queue-url --queue-name "${QUEUE_NAME}" --query QueueUrl --output text)
          QUEUE_ARN=$(aws sqs get-queue-attributes --queue-url "${QUEUE_URL}" --attribute-names QueueArn --query 'Attributes.QueueArn' --output text)

          cat > /tmp/queue-attributes.json <<JSON
          {
            "VisibilityTimeout": "180",
            "RedrivePolicy": "{\"deadLetterTargetArn\":\"${DLQ_ARN}\",\"maxReceiveCount\":\"3\"}"
          }
          JSON

          aws sqs set-queue-attributes \
            --queue-url "${QUEUE_URL}" \
            --attributes file:///tmp/queue-attributes.json >/dev/null

          TOPIC_ARN=$(aws sns create-topic --name "${TOPIC_NAME}" --query TopicArn --output text)

          if ! aws iam get-role --role-name "${ROLE_NAME}" >/dev/null 2>&1; then
            cat > /tmp/lambda-trust-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "lambda.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          JSON

            aws iam create-role \
              --role-name "${ROLE_NAME}" \
              --assume-role-policy-document file:///tmp/lambda-trust-policy.json >/dev/null
          fi

          aws iam attach-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole >/dev/null

          cat > /tmp/lambda-inline-policy.json <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "dynamodb:PutItem",
                  "dynamodb:GetItem",
                  "dynamodb:UpdateItem",
                  "dynamodb:DeleteItem",
                  "dynamodb:Query"
                ],
                "Resource": [
                  "${TABLE_ARN}",
                  "${TABLE_ARN}/index/*"
                ]
              },
              {
                "Effect": "Allow",
                "Action": [
                  "sqs:SendMessage",
                  "sqs:ReceiveMessage",
                  "sqs:DeleteMessage",
                  "sqs:GetQueueAttributes",
                  "sqs:ChangeMessageVisibility"
                ],
                "Resource": [
                  "${QUEUE_ARN}",
                  "${DLQ_ARN}"
                ]
              },
              {
                "Effect": "Allow",
                "Action": [
                  "sns:Publish"
                ],
                "Resource": [
                  "${TOPIC_ARN}"
                ]
              }
            ]
          }
          JSON

          aws iam put-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-name "${SERVICE_NAME}-${STAGE}-inline" \
            --policy-document file:///tmp/lambda-inline-policy.json >/dev/null

          ROLE_ARN=$(aws iam get-role --role-name "${ROLE_NAME}" --query 'Role.Arn' --output text)

          {
            echo "TABLE_NAME=${TABLE_NAME}"
            echo "QUEUE_URL=${QUEUE_URL}"
            echo "QUEUE_ARN=${QUEUE_ARN}"
            echo "TOPIC_ARN=${TOPIC_ARN}"
            echo "ROLE_ARN=${ROLE_ARN}"
            echo "API_FUNCTION_NAME=${SERVICE_NAME}-${STAGE}-api"
            echo "WORKER_FUNCTION_NAME=${SERVICE_NAME}-${STAGE}-health-worker"
          } >> "$GITHUB_ENV"

      - name: Deploy Lambda functions and bindings
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os

          payload = {
              "Variables": {
                  "TABLE_NAME": os.environ.get("TABLE_NAME", ""),
                  "SYSTEM_PULSE_TABLE": os.environ.get("TABLE_NAME", ""),
                  "USERS_TABLE": os.environ.get("TABLE_NAME", ""),
                  "HEALTH_CHECK_QUEUE_URL": os.environ.get("QUEUE_URL", ""),
                  "HEALTH_STATUS_TOPIC_ARN": os.environ.get("TOPIC_ARN", ""),
                  "RENDER_WAKEUP_DELAY_SECONDS": os.environ.get("RENDER_WAKEUP_DELAY_SECONDS", "90"),
                  "FRONTEND_URL": os.environ.get("FRONTEND_URL", ""),
                  "EMAIL_USER": os.environ.get("EMAIL_USER", ""),
                  "EMAIL_PASS": os.environ.get("EMAIL_PASS", ""),
                  "INVITE_ELIGIBILITY_HOURS": os.environ.get("INVITE_ELIGIBILITY_HOURS", "24"),
                  "PASSWORD_RESET_ELIGIBILITY_MINUTES": os.environ.get("PASSWORD_RESET_ELIGIBILITY_MINUTES", "30"),
                  "SHOW_INVITE_LINK": os.environ.get("SHOW_INVITE_LINK", "false"),
                  "ENABLE_HEALTH_LOGS": os.environ.get("ENABLE_HEALTH_LOGS", "true"),
                  "ENABLE_SNS_NOTIFICATIONS": os.environ.get("ENABLE_SNS_NOTIFICATIONS", "false"),
              }
          }

          with open("/tmp/lambda-environment.json", "w", encoding="utf-8") as fp:
              json.dump(payload, fp)
          PY

          deploy_function() {
            local FUNCTION_NAME="$1"
            local HANDLER="$2"
            local TIMEOUT="$3"
            local MEMORY="$4"
            local CREATED="false"
            local KMS_ARGS=()

            if [ -n "${LAMBDA_KMS_KEY_ARN:-}" ]; then
              KMS_ARGS=(--kms-key-arn "${LAMBDA_KMS_KEY_ARN}")
            fi

            if aws lambda get-function --function-name "${FUNCTION_NAME}" >/dev/null 2>&1; then
              aws lambda update-function-code \
                --function-name "${FUNCTION_NAME}" \
                --zip-file fileb://backend.zip >/dev/null

              aws lambda wait function-updated --function-name "${FUNCTION_NAME}"

              aws lambda update-function-configuration \
                --function-name "${FUNCTION_NAME}" \
                --role "${ROLE_ARN}" \
                --runtime nodejs20.x \
                --handler "${HANDLER}" \
                --timeout "${TIMEOUT}" \
                --memory-size "${MEMORY}" \
                "${KMS_ARGS[@]}" \
                --environment file:///tmp/lambda-environment.json >/dev/null
            else
              aws lambda create-function \
                --function-name "${FUNCTION_NAME}" \
                --runtime nodejs20.x \
                --role "${ROLE_ARN}" \
                --handler "${HANDLER}" \
                --timeout "${TIMEOUT}" \
                --memory-size "${MEMORY}" \
                "${KMS_ARGS[@]}" \
                --zip-file fileb://backend.zip \
                --environment file:///tmp/lambda-environment.json >/dev/null

              CREATED="true"
            fi

            if [ "${CREATED}" = "true" ]; then
              aws lambda wait function-active-v2 --function-name "${FUNCTION_NAME}"
            else
              aws lambda wait function-updated --function-name "${FUNCTION_NAME}"
            fi
          }

          deploy_function "${API_FUNCTION_NAME}" "dist/router-handler.api" 28 256
          deploy_function "${WORKER_FUNCTION_NAME}" "dist/handler.processHealthCheckQueue" 60 256

          if ! aws lambda get-function-url-config --function-name "${API_FUNCTION_NAME}" >/dev/null 2>&1; then
            aws lambda create-function-url-config \
              --function-name "${API_FUNCTION_NAME}" \
              --auth-type NONE >/dev/null
          else
            aws lambda update-function-url-config \
              --function-name "${API_FUNCTION_NAME}" \
              --auth-type NONE >/dev/null
          fi

          aws lambda add-permission \
            --function-name "${API_FUNCTION_NAME}" \
            --statement-id "function-url-public" \
            --action lambda:InvokeFunctionUrl \
            --principal "*" \
            --function-url-auth-type NONE >/dev/null 2>&1 || true

          MAPPING_UUID=$(aws lambda list-event-source-mappings \
            --function-name "${WORKER_FUNCTION_NAME}" \
            --event-source-arn "${QUEUE_ARN}" \
            --query 'EventSourceMappings[0].UUID' \
            --output text)

          if [ "${MAPPING_UUID}" = "None" ]; then
            aws lambda create-event-source-mapping \
              --function-name "${WORKER_FUNCTION_NAME}" \
              --event-source-arn "${QUEUE_ARN}" \
              --batch-size 5 \
              --function-response-types ReportBatchItemFailures \
              --enabled >/dev/null
          else
            aws lambda update-event-source-mapping \
              --uuid "${MAPPING_UUID}" \
              --batch-size 5 \
              --function-response-types ReportBatchItemFailures \
              --enabled >/dev/null
          fi

          FUNCTION_URL=$(aws lambda get-function-url-config --function-name "${API_FUNCTION_NAME}" --query FunctionUrl --output text)
          echo "FUNCTION_URL=${FUNCTION_URL}" >> "$GITHUB_ENV"

      - name: Deployment summary
        run: |
          {
            echo "### Backend deployment complete"
            echo "- Stage: ${STAGE}"
            echo "- Region: ${AWS_REGION}"
            echo "- API Lambda: ${API_FUNCTION_NAME}"
            echo "- Worker Lambda: ${WORKER_FUNCTION_NAME}"
            echo "- Table: ${TABLE_NAME}"
            echo "- Queue URL: ${QUEUE_URL}"
            echo "- Topic ARN: ${TOPIC_ARN}"
            echo "- Function URL: ${FUNCTION_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
